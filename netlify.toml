[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security Headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # HTTPS-only for 2 years (preload-ready)
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Limit referrer leakage
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Disable unused browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
